mqtt_client:
  ros__parameters:
    broker:
      host: 127.0.0.1
      port: 1883
      tls:
        enabled: false
    client:
      id: "vst_999000_robot"
      clean_session: true
      keep_alive_interval: 15.0  # VDA5050 recommends around 15 seconds (Section 6.14)
      max_inflight: 65535
      buffer:
        size: 0
        directory: "buffer"
      last_will:
        topic: uagv/v2/vst/999000/connection
        message: '{"headerId": 0, "timestamp": "", "version": "2.1.0", "manufacturer": "vst", "serialNumber": "999000", "connectionState": "CONNECTIONBROKEN"}'
        qos: 1
        retained: true
    bridge:
      ros2mqtt:
        ros_topics: 
          - /vda5050/state
          - /vda5050/visualization
          - /vda5050/connection
          - /vda5050/factsheet
        /vda5050/state:
          mqtt_topic: uagv/v2/vst/999000/state
          primitive: true
        /vda5050/visualization:
          mqtt_topic: uagv/v2/vst/999000/visualization
          primitive: true
        /vda5050/connection:
          mqtt_topic: uagv/v2/vst/999000/connection
          primitive: true
          advanced:
            mqtt:
              qos: 1
              retained: true
        /vda5050/factsheet:
          mqtt_topic: uagv/v2/vst/999000/factsheet
          primitive: true
          advanced:
            mqtt:
              retained: true

      mqtt2ros:
        mqtt_topics: 
          - uagv/v2/vst/999000/order
          - uagv/v2/vst/999000/instantActions
        uagv/v2/vst/999000/order:
          ros_topic: /vda5050/order
          primitive: true
          ros_type: "std_msgs/msg/String"
        uagv/v2/vst/999000/instantActions:
          ros_topic: /vda5050/instant_actions
          primitive: true
          ros_type: "std_msgs/msg/String"
