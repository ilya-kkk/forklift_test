cmd_vel_to_motors:
  ros__parameters:
    use_sim_time: true
    enabled: true
    cmd_vel_topic: /cmd_vel
    steering_cmd_topic: /forklift/right_steering_cmd
    wheel_cmd_topic: /forklift/right_wheel_cmd
    motion_mode_topic: /motion_mode
    motion_mode: BODY_FIRST
    reverse_velocity_scale: 0.5
    motion_mode_linear_deadband: 0.02
    cmd_vel_frame: base_link
    steering_joint_name: right_steering_joint
    drive_wheel_joint_name: right_wheel_joint
    drive_wheel_radius: 0.125
    drive_wheel_velocity_sign: -1.0
    publish_rate: 30.0
    command_timeout_sec: 0.25
    motion_epsilon: 0.0001
    center_steering_on_stop: false
    joint_states_topic: /joint_states
    require_steering_alignment: false
    steering_alignment_tolerance_rad: 0.05235987755982989
    steering_state_timeout_sec: 0.3
