controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 30.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.5
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 10.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.2
      yaw_goal_tolerance: 0.3
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.85
      lookahead_dist: 1.0
      min_lookahead_dist: 1.0
      max_lookahead_dist: 1.0
      lookahead_time: 1.4
      use_velocity_scaled_lookahead_dist: false
      transform_tolerance: 0.2
      min_approach_linear_velocity: 0.12
      approach_velocity_scaling_dist: 0.7
      use_collision_detection: false
      use_cost_regulated_linear_velocity_scaling: false
      use_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 1.0
      regulated_linear_scaling_min_speed: 0.10
      use_rotate_to_heading: false
      allow_reversing: true
      max_robot_pose_search_dist: 1.5
      use_interpolation: false

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      global_frame: odom
      robot_base_frame: tracking_link
      rolling_window: true
      width: 12
      height: 12
      resolution: 0.05
      update_frequency: 10.0
      publish_frequency: 5.0
      always_send_full_costmap: true
      footprint: "[[0.50, 0.42], [0.50, -0.42], [-0.98, -0.42], [-0.98, 0.42]]"
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          clearing: true
          marking: true
          max_obstacle_height: 2.0
          obstacle_max_range: 8.0
          raytrace_max_range: 10.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        enabled: true
        inflation_radius: 0.55
        cost_scaling_factor: 3.0

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names: ["controller_server"]
