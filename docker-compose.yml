services:
  sim:
    build:
      context: .
      dockerfile: Dockerfile
    image: forklift_demo:jazzy
    container_name: forklift_demo_sim
    network_mode: host
    ipc: host
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-73}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      XAUTHORITY: /tmp/.Xauthority
    volumes:
      - .:/ws
      - colcon_build_jazzy:/ws/build
      - colcon_install_jazzy:/ws/install
      - colcon_log_jazzy:/ws/log
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro
    command: >
      bash -lc "
      rm -f /ws/install/.forklift_demo_ready &&
      rm -rf
      /ws/build/forklift_demo /ws/install/forklift_demo
      /ws/build/forklift_demo_control /ws/install/forklift_demo_control
      /ws/build/forklift_demo_description /ws/install/forklift_demo_description
      /ws/build/ros2_templates /ws/install/ros2_templates &&
      colcon build --packages-up-to forklift_demo --cmake-force-configure &&
      touch /ws/install/.forklift_demo_ready &&
      source /ws/install/setup.bash &&
      ros2 launch forklift_demo sim_followpath.launch.py launch_rviz:=false launch_gz_gui:=true"

  rviz:
    image: forklift_demo:jazzy
    container_name: forklift_demo_rviz
    user: "1000:1000"
    depends_on:
      - sim
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      HOME: /tmp/rviz-home
      ROS_LOG_DIR: /tmp/rviz-home/.ros/log
      XDG_RUNTIME_DIR: /tmp/runtime-user
      XAUTHORITY: /tmp/.Xauthority
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-73}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    volumes:
      - .:/ws
      - colcon_install_jazzy:/ws/install:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro
    command: >
      bash -lc "
      mkdir -p /tmp/rviz-home/.ros/log &&
      mkdir -p /tmp/runtime-user &&
      chmod 700 /tmp/runtime-user &&
      until [ -f /ws/install/.forklift_demo_ready ]; do sleep 1; done &&
      source /ws/install/setup.bash &&
      for i in $(seq 1 30); do ros2 topic echo /clock --once >/dev/null 2>&1 && break; sleep 1; done &&
      sleep 2 &&
      ros2 run rviz2 rviz2 -d /ws/src/rviz/rviz/demo.rviz --ros-args -p use_sim_time:=true"

  rqt:
    image: forklift_demo:jazzy
    container_name: forklift_demo_rqt
    user: "1000:1000"
    depends_on:
      - sim
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      HOME: /tmp/rqt-home
      ROS_LOG_DIR: /tmp/rqt-home/.ros/log
      XDG_RUNTIME_DIR: /tmp/runtime-user
      XAUTHORITY: /tmp/.Xauthority
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-73}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    volumes:
      - .:/ws
      - colcon_install_jazzy:/ws/install:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro
    command: >
      bash -lc "
      mkdir -p /tmp/rqt-home/.ros/log &&
      mkdir -p /tmp/runtime-user &&
      chmod 700 /tmp/runtime-user &&
      until [ -f /ws/install/.forklift_demo_ready ]; do sleep 1; done &&
      source /ws/install/setup.bash &&
      ros2 run rqt_robot_steering rqt_robot_steering --ros-args
      -p default_topic:=/cmd_vel_raw
      -p default_vx_min:=-0.85
      -p default_vx_max:=0.85
      -p default_vw_min:=-1.0
      -p default_vw_max:=1.0"

  fork_slider:
    image: forklift_demo:jazzy
    container_name: forklift_demo_fork_slider
    user: "1000:1000"
    depends_on:
      - sim
    network_mode: host
    ipc: host
    environment:
      DISPLAY: ${DISPLAY:-:0}
      QT_X11_NO_MITSHM: "1"
      LIBGL_ALWAYS_SOFTWARE: "1"
      HOME: /tmp/fork-slider-home
      ROS_LOG_DIR: /tmp/fork-slider-home/.ros/log
      XDG_RUNTIME_DIR: /tmp/runtime-user
      XAUTHORITY: /tmp/.Xauthority
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-73}
      RMW_IMPLEMENTATION: ${RMW_IMPLEMENTATION:-rmw_cyclonedds_cpp}
    volumes:
      - .:/ws
      - colcon_install_jazzy:/ws/install:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-/dev/null}:/tmp/.Xauthority:ro
    command: >
      bash -lc "
      mkdir -p /tmp/fork-slider-home/.ros/log &&
      mkdir -p /tmp/runtime-user &&
      chmod 700 /tmp/runtime-user &&
      until [ -f /ws/install/.forklift_demo_ready ]; do sleep 1; done &&
      source /ws/install/setup.bash &&
      ros2 run slider_publisher slider_publisher --ros-args
      -p config:=/ws/src/fork_manager/config/fork_slider_publisher.yaml
      -p rate:=20.0"

volumes:
  colcon_build_jazzy:
  colcon_install_jazzy:
  colcon_log_jazzy:
